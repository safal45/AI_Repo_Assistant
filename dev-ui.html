<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Repo Assistant Dev UI</title>
<style>
  body { font-family: monospace; max-width: 700px; margin: 2rem auto; }
  fieldset { margin-bottom: 1rem; }
  input, select, textarea, button { font-family: inherit; font-size: 1rem; width: 100%; margin: 0.25rem 0; box-sizing: border-box; }
  button { width: auto; padding: 0.4rem 1rem; }
  textarea { height: 5rem; }
  pre { white-space: pre-wrap; background: #eee; padding: 0.5rem; }
  .row { display: flex; gap: 0.5rem; }
  .row input { flex: 1; }
</style>
</head>
<body>

<h2>Repo Assistant Dev UI</h2>

<fieldset>
  <legend>API base URL</legend>
  <input id="apiBase" value="http://localhost:8000">
</fieldset>

<fieldset>
  <legend>Login</legend>
  <input id="email" placeholder="email" value="">
  <input id="password" type="password" placeholder="password" value="">
  <button onclick="login()">Login</button>
  <pre id="loginStatus">not logged in</pre>
</fieldset>

<fieldset>
  <legend>Repository</legend>
  <div class="row">
    <select id="repoSelect"></select>
    <button onclick="loadRepos()">Refresh</button>
  </div>
</fieldset>

<fieldset>
  <legend>Ask</legend>
  <textarea id="question" placeholder="Ask something about the selected repo..."></textarea>
  <button onclick="ask()">Ask agent</button>
</fieldset>

<h3>Response</h3>
<pre id="output"></pre>

<script>
let token = null;

function base() {
  return document.getElementById('apiBase').value.replace(/\/$/, '');
}

async function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const body = new URLSearchParams();
  body.set('username', email);
  body.set('password', password);

  const res = await fetch(base() + '/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body,
  });

  const data = await res.json();

  if (!res.ok) {
    document.getElementById('loginStatus').textContent = 'login failed: ' + JSON.stringify(data);
    return;
  }

  token = data.access_token;
  document.getElementById('loginStatus').textContent = 'logged in as ' + data.user.email;
  loadRepos();
}

async function authedFetch(path, options = {}) {
  options.headers = Object.assign({}, options.headers, {
    Authorization: 'Bearer ' + token,
  });
  return fetch(base() + path, options);
}

async function loadRepos() {
  if (!token) return;

  const res = await authedFetch('/repositories');
  const data = await res.json();

  const select = document.getElementById('repoSelect');
  select.innerHTML = '';

  if (!res.ok) {
    document.getElementById('output').textContent = 'failed to load repos: ' + JSON.stringify(data);
    return;
  }

  for (const repo of data) {
    const opt = document.createElement('option');
    opt.value = repo.id;
    opt.textContent = repo.name + ' (' + repo.status + ') - ' + repo.id;
    select.appendChild(opt);
  }
}

async function ask() {
  const repoId = document.getElementById('repoSelect').value;
  const question = document.getElementById('question').value;
  const output = document.getElementById('output');

  if (!token) {
    output.textContent = 'log in first';
    return;
  }

  if (!repoId) {
    output.textContent = 'no repo selected';
    return;
  }

  output.textContent = 'asking...';

  const res = await authedFetch('/repositories/' + repoId + '/agent', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ question }),
  });

  const data = await res.json();

  if (!res.ok) {
    output.textContent = 'error: ' + JSON.stringify(data);
    return;
  }

  output.textContent = data.answer;
}
</script>

</body>
</html>
